services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
    # Codex uses sandboxing that needs nested user namespaces in Docker.
    # Keep this development-only; production containers should retain seccomp.
    security_opt:
      - seccomp=unconfined
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ${HOME}/.codex-annabel:/root/.codex
      - composer-cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      COMPOSER_MEMORY_LIMIT: -1

  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
    working_dir: /workspace
    command: serve-skeleton
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/workspace
      - composer-cache:/tmp/composer-cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-annabel}
      DB_USERNAME: ${MYSQL_USER:-annabel}
      DB_PASSWORD: ${MYSQL_PASSWORD:-annabel}
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      COMPOSER_MEMORY_LIMIT: -1

  nginx:
    image: nginx:1.28-alpine
    ports:
      - "${NGINX_PORT:-8002}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  db:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-annabel}
      MYSQL_USER: ${MYSQL_USER:-annabel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-annabel}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-annabel}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-annabel}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"

volumes:
  composer-cache:
  mysql-data:
